[screen]
width = 1920          ; e.g. for 12.3" 1920x720
height = 720

[gauges]
layout_json = [{"type":"analog","x":200,"y":200,"label":"Tach","min":0,"max":8000,"sensor":"rpm"},
               {"type":"analog","x":500,"y":200,"label":"Speed","min":0,"max":160,"sensor":"speed"},
               {"type":"analog","x":800,"y":200,"label":"Fuel Pressure","min":0,"max":100,"sensor":"fuel_pressure","unit":"PSI"},
               {"type":"analog","x":1100,"y":200,"label":"Oil Pressure","min":0,"max":150,"sensor":"oil_pressure","unit":"PSI"},
               {"type":"analog","x":1400,"y":200,"label":"Trans Pressure","min":0,"max":150,"sensor":"trans_pressure","unit":"PSI"}]
