[screen]
width = 1920
height = 720          ; change for your main screen (12.3", 15.6", etc.)

[gauges]
layout_json = [
  {"type":"analog","x":150,"y":180,"label":"Tach","min":0,"max":8000,"sensor":"rpm","unit":"RPM"},
  {"type":"analog","x":450,"y":180,"label":"Speed","min":0,"max":160,"sensor":"speed","unit":"MPH"},
  {"type":"analog","x":750,"y":180,"label":"Fuel P","min":0,"max":100,"sensor":"fuel_pressure","unit":"PSI"},
  {"type":"analog","x":1050,"y":180,"label":"Oil P","min":0,"max":150,"sensor":"oil_pressure","unit":"PSI"},
  {"type":"analog","x":1350,"y":180,"label":"Boost","min":-15,"max":30,"sensor":"boost","unit":"PSI"},
  {"type":"digital","x":200,"y":500,"label":"Coolant","sensor":"coolant_temp","unit":"°C"},
  {"type":"digital","x":500,"y":500,"label":"Trans Temp","sensor":"trans_temp","unit":"°C"},
  {"type":"digital","x":800,"y":500,"label":"Oil Temp","sensor":"oil_temp","unit":"°C"},
  {"type":"digital","x":1100,"y":500,"label":"Battery","sensor":"battery_volt","unit":"V"},
  {"type":"digital","x":1400,"y":500,"label":"Fuel Level","sensor":"fuel_level","unit":"%"},
  {"type":"indicator","x":1700,"y":100,"label":"Highbeam"},
  {"type":"indicator","x":1700,"y":200,"label":"Turn L"},
  {"type":"indicator","x":1700,"y":300,"label":"Turn R"},
  {"type":"indicator","x":1700,"y":400,"label":"Hazard"}
]
